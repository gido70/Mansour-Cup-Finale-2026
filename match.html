<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>تفاصيل المباراة</title>
  <link rel="icon" type="image/png" href="assets/img/logo-tournament.png">
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#0b1f3a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="كأس منصور">
  <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png">
  <style>
    .home-wrap{max-width:1200px;margin:0 auto;padding:18px 14px 40px;}
    .section-card{background:linear-gradient(180deg, rgba(12,30,58,.96), rgba(8,23,44,.96));border:1px solid rgba(255,255,255,.08);border-radius:22px;box-shadow:0 12px 34px rgba(0,0,0,.24);overflow:hidden;margin-bottom:24px;}
    .section-head{display:flex;align-items:center;justify-content:center;padding:18px 22px;border-bottom:1px solid rgba(255,255,255,.08);background:linear-gradient(90deg, rgba(255,255,255,.03), rgba(255,255,255,.01));}
    .section-head h2{margin:0;font-size:2rem;color:#fff;text-align:center;line-height:1.2;}
    .match-meta{padding:16px 22px;text-align:center;color:#d9e6ff;font-size:1.05rem;display:flex;justify-content:center;gap:18px;flex-wrap:wrap}
    .score-row{display:grid;grid-template-columns:1fr auto 1fr;gap:18px;align-items:center;padding:20px 22px;border-top:1px solid rgba(255,255,255,.06);border-bottom:1px solid rgba(255,255,255,.06)}
    .team-name{font-size:2rem;font-weight:800;color:#fff;line-height:1.5}
    .score-box{min-width:150px;text-align:center;font-size:3rem;font-weight:900;padding:12px 18px;border-radius:16px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);color:#fff}
    .body-pad{padding:18px 22px}
    .list-box{border-radius:18px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);padding:16px;color:#fff;margin-bottom:16px}
    .list-box h3{margin:0 0 12px;font-size:1.5rem}
    .item{padding:10px 12px;border-radius:12px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.05);margin-bottom:10px}
    .empty{padding:14px;border-radius:14px;background:rgba(255,255,255,.03);border:1px dashed rgba(255,255,255,.18);color:#fff}
    @media (max-width:720px){.score-row{grid-template-columns:1fr}.team-name{text-align:center;font-size:1.5rem}.score-box{margin:0 auto;font-size:2.2rem;min-width:120px}}
  </style>
</head>
<body>
<header class="topbar"><div class="topbar-logos"><img class="logo" src="assets/img/logo-committee-white.png" alt="شعار اللجنة" /></div><div class="brand"><div class="brand-title">بطولة كأس منصور بن زايد 2026</div><div class="brand-sub">تفاصيل المباراة</div></div><div class="topbar-logos"><img class="logo" src="assets/img/logo-cup-white.png" alt="شعار البطولة" /></div><nav class="nav"><a class="nav-link" href="index.html">الرئيسية</a><a class="nav-link" href="group.html?g=A">المجموعة A</a><a class="nav-link" href="group.html?g=B">المجموعة B</a><a class="nav-link" href="group.html?g=C">المجموعة C</a><a class="nav-link" href="group.html?g=D">المجموعة D</a><a class="nav-link" href="knockout.html">الأدوار النهائية</a></nav></header>
<main class="home-wrap"><section class="section-card"><div class="section-head"><h2 id="matchTitle">تفاصيل المباراة</h2></div><div class="match-meta"><span id="stageLabel">-</span><span id="matchDate">-</span><span id="matchTime">-</span></div><div class="score-row"><div class="team-name" id="homeTeam">-</div><div class="score-box" id="scoreBox">0 : 0</div><div class="team-name" id="awayTeam">-</div></div><div class="body-pad"><div class="list-box"><h3>الأهداف</h3><div id="goalsList" class="empty">لا توجد أهداف مسجلة لهذه المباراة.</div></div><div class="list-box"><h3>أحداث المباراة</h3><div id="eventsList" class="empty">لا توجد أحداث مسجلة لهذه المباراة.</div></div></div></section></main>
<footer class="footer"><a class="muted" href="javascript:history.back()">العودة</a></footer>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="config.js"></script>
<script>
(function(){
  const params = new URLSearchParams(window.location.search);
  const matchId = params.get('id');
  const teamCache = new Map();
  const stageMap = {'Group Stage':'دور المجموعات','Quarter Final':'ربع النهائي','Semi Final':'نصف النهائي','Third Place':'الثالث والرابع','Final':'النهائي'};
  async function preloadTeams(){ const {data}=await supabaseClient.from('teams').select('id,name'); (data||[]).forEach(t=>teamCache.set(t.id,t.name)); }
  function setText(id,val){ document.getElementById(id).textContent = val || '-'; }
  function renderList(elId, items, emptyText){ const el=document.getElementById(elId); if(!items.length){ el.className='empty'; el.textContent=emptyText; return; } el.className=''; el.innerHTML=items.map(x=>`<div class="item">${x}</div>`).join(''); }
  async function load(){
    if(!matchId){ setText('matchTitle','لا يوجد معرف مباراة'); return; }
    await preloadTeams();
    const {data: match, error: matchError} = await supabaseClient.from('matches').select(`id, stage, round_name, match_date, kickoff_time, home_score, away_score, home_team:home_team_id ( id, name ), away_team:away_team_id ( id, name )`).eq('id', matchId).single();
    if(matchError || !match){ console.error(matchError); setText('matchTitle','تعذر تحميل تفاصيل المباراة'); return; }
    const stageLabel = match.round_name || stageMap[match.stage] || match.stage || 'مباراة';
    setText('matchTitle', stageLabel); setText('stageLabel', stageLabel); setText('matchDate', match.match_date || '-'); setText('matchTime', match.kickoff_time || '-'); setText('homeTeam', match.home_team?.name || '-'); setText('awayTeam', match.away_team?.name || '-'); setText('scoreBox', `${Number.isInteger(match.home_score)?match.home_score:0} : ${Number.isInteger(match.away_score)?match.away_score:0}`);
    const {data: goals} = await supabaseClient.from('goals').select('minute, goal_type, team_id, player_id').eq('match_id', matchId).order('minute',{ascending:true});
    const {data: players} = await supabaseClient.from('players').select('id, full_name');
    const playerMap = new Map((players||[]).map(p=>[p.id,p.full_name]));
    const goalItems = (goals||[]).map(g=>{ const team = teamCache.get(g.team_id)||'فريق'; const player = playerMap.get(g.player_id)||''; const kind = g.goal_type==='goal'?'هدف':(g.goal_type||'هدف'); return `${kind} - ${team}${player ? ' - ' + player : ''} - الدقيقة ${g.minute ?? '-'}`; });
    renderList('goalsList', goalItems, 'لا توجد أهداف مسجلة لهذه المباراة.');
    const {data: events} = await supabaseClient.from('match_events').select('minute, event_type, team_id, player_id').eq('match_id', matchId).order('minute',{ascending:true});
    const eventLabel = {goal:'هدف',yellow_card:'بطاقة صفراء',red_card:'بطاقة حمراء',var:'VAR',injury:'إصابة',penalty_goal:'هدف من ضربة جزاء',penalty_missed:'ضربة جزاء ضائعة',own_goal:'هدف عكسي',shot_on_target_saved:'تصدى حارس المرمى'};
    const eventItems = (events||[]).map(e=>{ const team = teamCache.get(e.team_id)||'فريق'; const player = playerMap.get(e.player_id)||''; return `${eventLabel[e.event_type] || e.event_type} - ${team}${player ? ' - ' + player : ''} - الدقيقة ${e.minute ?? '-'}`; });
    renderList('eventsList', eventItems, 'لا توجد أحداث مسجلة لهذه المباراة.');
  }
  document.addEventListener('DOMContentLoaded', load);
})();
</script></body></html>
